[workspace]
members = [
    "genesis-core",
    "genesis-baker",
    "genesis-runtime",
    "genesis-ide",
]
resolver = "2"

[workspace.package]
version = "0.0.0"
edition = "2021"
authors = ["Oleksandr Arzamazov <olexandrarzamazov@gmail.com>"]
license = "GPL-3.0-or-later"
repository = "https://github.com/OxAlex-AGI/genesis"

[workspace.dependencies]
# genesis-core is a local dep for the others
genesis-core = { path = "genesis-core" }
