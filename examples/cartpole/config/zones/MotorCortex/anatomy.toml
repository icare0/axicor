# Если в шарде всего один монолитный слой,
# покрывающий весь объем пространства
# то блок [[layer]] должен быть только один:

[[layer]]
name = "L4_Sensory_Monolith"
height_pct = 1.0                                    # 100% высоты шарда
density = 0.5                                       # Абсолютная плотность
composition = { "L4_spiny_MTG_1" = 0.8, "L4_aspiny_MTG_11" = 0.2 }



