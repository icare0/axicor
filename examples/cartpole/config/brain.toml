[simulation]
config = "config/simulation.toml"

[[zone]]
name = "SensoryCortex"
blueprints = "config/zones/SensoryCortex/blueprints.toml"
anatomy = "config/zones/SensoryCortex/anatomy.toml"
io = "config/zones/SensoryCortex/io.toml"
shard = "config/zones/SensoryCortex/shard.toml"
baked_dir = "baked/SensoryCortex/"

[[zone]]
name = "HiddenCortex"
blueprints = "config/zones/HiddenCortex/blueprints.toml"
anatomy = "config/zones/HiddenCortex/anatomy.toml"
io = "config/zones/HiddenCortex/io.toml"
shard = "config/zones/HiddenCortex/shard.toml"
baked_dir = "baked/HiddenCortex/"

[[zone]]
name = "MotorCortex"
blueprints = "config/zones/MotorCortex/blueprints.toml"
anatomy = "config/zones/MotorCortex/anatomy.toml"
io = "config/zones/MotorCortex/io.toml"
shard = "config/zones/MotorCortex/shard.toml"
baked_dir = "baked/MotorCortex/"

[[connection]]
from = "SensoryCortex"
to = "HiddenCortex"
output_matrix = "sensory_out"
width = 8
height = 8
entry_z = "top"         # [!] Призрачные аксоны прорастут с потолка (Z=63)
target_type = "All"
growth_steps = 50       # Растут вниз до дна

[[connection]]
from = "HiddenCortex"
to = "MotorCortex"
output_matrix = "hidden_out"
width = 8
height = 8
entry_z = "top"         # [!] Снова инжектируем сигнал в потолок
target_type = "All"
growth_steps = 50
