[simulation]
config = "examples/cartpole/config/simulation.toml"

[[zone]]
name = "SensoryCortex"
blueprints = "examples/cartpole/config/zones/SensoryCortex/blueprints.toml"
anatomy = "examples/cartpole/config/zones/SensoryCortex/anatomy.toml"
io = "examples/cartpole/config/zones/SensoryCortex/io.toml"
shard = "examples/cartpole/config/zones/SensoryCortex/shard.toml"
baked_dir = "examples/cartpole/baked/SensoryCortex/"

[[zone]]
name = "HiddenCortex"
blueprints = "examples/cartpole/config/zones/HiddenCortex/blueprints.toml"
anatomy = "examples/cartpole/config/zones/HiddenCortex/anatomy.toml"
io = "examples/cartpole/config/zones/HiddenCortex/io.toml"
shard = "examples/cartpole/config/zones/HiddenCortex/shard.toml"
baked_dir = "examples/cartpole/baked/HiddenCortex/"

[[zone]]
name = "MotorCortex"
blueprints = "examples/cartpole/config/zones/MotorCortex/blueprints.toml"
anatomy = "examples/cartpole/config/zones/MotorCortex/anatomy.toml"
io = "examples/cartpole/config/zones/MotorCortex/io.toml"
shard = "examples/cartpole/config/zones/MotorCortex/shard.toml"
baked_dir = "examples/cartpole/baked/MotorCortex/"

[[connection]]
from = "SensoryCortex"
to = "HiddenCortex"
output_matrix = "sensory_out"   # Берет матрицу из SensoryCortex/io.toml
width = 16                      # Проецирует как сетку 16x16
height = 16
entry_z = "mid"                 # Сенсорный сигнал бьет в средние слои (L4) ассоциативной коры
target_type = "All"
growth_steps = 50

[[connection]]
from = "HiddenCortex"
to = "MotorCortex"
output_matrix = "hidden_out"    # Берет матрицу из HiddenCortex/io.toml
width = 16
height = 16
entry_z = "top"                 # Ассоциативный план обычно бьет сверху (L2/3/5) моторной
target_type = "All"
growth_steps = 50