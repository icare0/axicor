# ============================================================
# GENESIS Reference Config — Instance (Shard)
# ============================================================
# Данный файл описывает конфигурацию ОДНОГО инстанса (шарда) 
# для распределенного запуска в genesis-runtime.
# НЕ ИСПОЛЬЗУЙТЕ ЕГО ДЛЯ ЗАПУСКА. Это справочник форматов.

# STRING: ID зоны, которую загружает этот шард. 
# Должно соответствовать папке в `config/zones/` (например, "V1").
zone_id = "V1"

# Смещение этого шарда в глобальном координатном пространстве (в вокселях).
# Для первого или единственного шарда всегда { x=0, y=0, z=0 }.
[world_offset]
x = 0
y = 0
z = 0

# Размеры области (Bounding Box), которую симулирует этот шард (в вокселях).
[dimensions]
w = 500
d = 500
h = 1000

# Описание границ (BSP Tree / 3D Grid Topology) и соседей.
# Если соседа нет (граница мозга), ключ нужно опустить (или закомментировать).
# "Self" = Тороидальная топология (loopback, выход с одной стороны входит с другой).
# "IP:Port" = TCP адрес соседнего инстанса genesis-runtime.
[neighbors]
# x_plus = "192.168.1.10:8000"
# x_minus = "192.168.1.11:8000"
# y_plus = "Self"
# y_minus = "Self"
