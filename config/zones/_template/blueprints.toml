# ============================================================
# GENESIS Zone Template — Blueprints (4 Neuron Types)
# ============================================================
# Каждый [[neuron_type]] получает индекс 0..N-1 по порядку объявления.
# Этот индекс = 4-битная type_mask (0..15) в PackedPosition и flags.
# В anatomy.toml ссылка идёт по полю `name`.
# Максимум 16 типов на зону. Справочник всех параметров: _blank_blueprints.toml

# --- Type 0: Основной возбуждающий (пирамидальный) ---
